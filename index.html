<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Battle.dev</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
padding:30px;
}

#status{
margin:15px;
font-size:16px;
color:#bbb;
}

#result{
display:none;
margin:10px 0 0 0;
}

#cards{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
margin:30px;
position: relative;
align-items: flex-start;
}

.card{

width:160px;
min-height:260px;

border-radius:14px;

display:flex;
flex-direction:column;
justify-content:flex-start;
gap:10px;

padding:15px;

cursor:pointer;

color:white;

box-shadow:0 6px 16px rgba(0,0,0,.6);

transition: transform 0.25s ease, box-shadow 0.25s ease;
transform-origin: center top;
opacity: 0;
transform: translateY(-80px) scale(0.8);
animation: dealCard 0.5s ease forwards;
flex-shrink: 0;
}

.card h2{
  margin: 4px 0 2px;
}

.personality{
  font-size:13px;
  opacity:.8;
  margin: 10px;
  line-height: 1.2;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  overflow: hidden;
  min-height: 2.4em;
}

.stats{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.stat{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
}

.bar{
  flex:1;
  height:5px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,#00c6ff,#0072ff);
  transition:.3s;
}

.card:hover{
transform:scale(1.08);
}

.card-logo{
font-size:55px;
text-align:center;
}

.selected{

border:3px solid white;

box-shadow:
0 0 10px white,
0 0 20px white,
0 0 40px white;

transform: translateY(-12px) scale(1.12);

z-index: 10;
}

#roundOutcome{
margin-top:20px;
}

.round-explain{
  margin-top:8px;
  font-size:12px;
  opacity:.9;
}

#question.is-gameover-question{
opacity:.65;
font-size:1.5rem;
margin-bottom:8px;
}

.gameover-panel{
width:min(100%, 620px);
margin:10px auto 0;
padding:28px 26px 30px;
border-radius:24px;
background:
linear-gradient(180deg, rgba(0,198,255,.08), rgba(46,204,113,.06)),
rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,.08);
box-shadow:
0 18px 48px rgba(0,0,0,.35),
0 0 0 1px rgba(0,198,255,.06) inset;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:14px;
animation: gameoverReveal .45s ease-out forwards;
}

.gameover-eyebrow{
font-size:.82rem;
letter-spacing:2.5px;
text-transform:uppercase;
color:#8fdfff;
opacity:.9;
}

.gameover-trophy{
width:74px;
height:74px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
background:radial-gradient(circle, rgba(46,204,113,.3), rgba(46,204,113,.08));
box-shadow:0 0 30px rgba(46,204,113,.18);
}

.gameover-title{
margin:0;
font-size:clamp(2rem, 4vw, 3rem);
letter-spacing:1px;
color:#fff;
text-shadow:0 0 24px rgba(0,198,255,.18);
}

.gameover-subtitle{
margin:0;
color:#b8c4d0;
font-size:1rem;
}

.gameover-scoreline{
width:100%;
display:flex;
align-items:center;
justify-content:center;
gap:14px;
margin-top:6px;
flex-wrap:wrap;
}

.gameover-score{
min-width:170px;
padding:14px 18px;
border-radius:16px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.06);
display:flex;
flex-direction:column;
gap:6px;
}

.gameover-score.is-winner{
background:linear-gradient(180deg, rgba(52,152,219,.14), rgba(46,204,113,.14));
border-color:rgba(46,204,113,.24);
box-shadow:0 0 24px rgba(46,204,113,.14);
}

.gameover-score-name{
font-size:.82rem;
letter-spacing:.5px;
color:#b9c2cb;
}

.gameover-score-value{
font-size:2.2rem;
line-height:1;
color:#fff;
}

.gameover-score.is-winner .gameover-score-value{
color:#62d98e;
}

.gameover-score-separator{
font-weight:800;
letter-spacing:2px;
color:#45515d;
}

.gameover-rematch-state{
width:min(100%, 420px);
margin-top:4px;
padding:14px 16px;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
background:linear-gradient(180deg, rgba(13,24,35,.92), rgba(12,18,27,.82));
border:1px solid rgba(143,223,255,.18);
color:#cfeeff;
box-shadow:0 10px 28px rgba(0,0,0,.18);
animation: rematchFadeIn .28s ease-out forwards;
}

.gameover-rematch-copy{
display:flex;
flex-direction:column;
align-items:flex-start;
gap:4px;
text-align:left;
}

.gameover-rematch-copy strong{
font-size:.98rem;
font-weight:700;
color:inherit;
}

.gameover-rematch-copy small{
font-size:.8rem;
line-height:1.35;
color:rgba(230,244,255,.74);
}

.gameover-rematch-copy small:empty{
display:none;
}

.gameover-rematch-state .spinner{
border-color:rgba(143,223,255,.18);
border-top-color:#8fdfff;
}

.rematch-timer-ring{
box-shadow:0 0 0 1px rgba(143,223,255,.12);
}

.gameover-rematch-state.is-urgent{
border-color:rgba(46,204,113,.3);
background:linear-gradient(180deg, rgba(12,31,24,.95), rgba(13,24,20,.82));
color:#dbffe8;
box-shadow:0 12px 34px rgba(46,204,113,.12);
}

.gameover-rematch-state.is-urgent .spinner{
border-top-color:#62d98e;
}

.gameover-rematch-state.is-urgent .rematch-timer-ring{
background:conic-gradient(#62d98e calc(var(--p) * 1turn), rgba(255,255,255,.16) 0);
box-shadow:0 0 0 1px rgba(98,217,142,.16);
}

#actionButtons{
display:flex;
justify-content:center;
align-items:center;
gap:12px;
flex-wrap:wrap;
margin-top:20px;
}

.score-final{
max-width:360px !important;
margin:0 auto 12px auto !important;
gap:8px !important;
}

.score-final .score-side{
padding:8px 12px;
border-radius:12px;
}

.score-final .score-name{
font-size:.78rem;
max-width:110px;
}

.score-final .score-points{
font-size:1.5rem;
}

.score-final .score-vs{
padding:0 6px;
margin-bottom:0;
font-size:.85rem;
}

.score-final .score-check{
display:none;
}

button{

padding:10px 20px;

border:none;
border-radius:8px;

font-size:16px;

cursor:pointer;

margin:10px;

}

#rematchBtn{
display:none;

padding:13px 44px;

font-size:15px;
font-weight:600;
letter-spacing:1px;

background:linear-gradient(135deg,#2ecc71,#27ae60);

color:#fff;

border:none;
border-radius:10px;

cursor:pointer;

transition:.2s;

box-shadow:0 6px 20px rgba(46,204,113,.35);
}

#rematchBtn:hover{
transform:translateY(-2px);
box-shadow:0 10px 28px rgba(46,204,113,.5);
}

#declineRematchBtn{
display:none;
padding:13px 28px;
font-size:15px;
font-weight:600;
letter-spacing:.5px;
background:linear-gradient(135deg, rgba(22,28,36,.95), rgba(28,36,46,.95));
color:#d9e4ef;
border:1px solid rgba(143,223,255,.16);
border-radius:10px;
cursor:pointer;
transition:.2s;
box-shadow:0 6px 20px rgba(0,0,0,.22);
}

#declineRematchBtn:hover{
transform:translateY(-2px);
border-color:rgba(143,223,255,.3);
box-shadow:0 10px 24px rgba(0,0,0,.26);
}

#confirmBtn{
padding:13px 44px;
font-size:15px;
font-weight:600;
letter-spacing:1px;

background:linear-gradient(135deg,#2ecc71,#27ae60);
color:#fff;

border:none;
border-radius:10px;

cursor:pointer;

transition:.2s;
box-shadow:0 6px 20px rgba(46,204,113,.35);

display:none;
}

#confirmBtn:hover{
transform:translateY(-2px);
box-shadow:0 10px 28px rgba(46,204,113,.5);
}

#nextBtn{
padding:13px 44px;
font-size:15px;
font-weight:600;
letter-spacing:1px;

background:linear-gradient(135deg,#2ecc71,#27ae60);
color:#fff;

border:none;
border-radius:10px;

cursor:pointer;

transition:.2s;
box-shadow:0 6px 20px rgba(46,204,113,.35);

display:none;
}

#nextBtn:hover{
transform:translateY(-2px);
box-shadow:0 10px 28px rgba(46,204,113,.5);
}

#loginScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
gap:6px;
}

#loginForm{
display:flex;
flex-direction:column;
gap:18px;
align-items:center;
}

h1 {
font-size:2.4rem;
letter-spacing:2px;
margin:0 0 8px 0;
background:linear-gradient(90deg,#3498db,#2ecc71);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

#playerNameInput{
padding:13px 18px;
font-size:16px;
border:2px solid #333;
border-radius:10px;
width:280px;
background:#1a1a1a;
color:white;
text-align:center;
transition:.2s;
}

#playerNameInput:focus{
outline:none;
border-color:#2ecc71;
box-shadow:0 0 0 3px rgba(46,204,113,.2);
}

#startGameBtn{
padding:13px 44px;
font-size:16px;
background:linear-gradient(135deg,#2ecc71,#27ae60);
color:white;
border:none;
border-radius:10px;
cursor:pointer;
transition:.2s;
letter-spacing:.5px;
font-weight:600;
}

#startGameBtn:hover{
transform:translateY(-2px);
box-shadow:0 6px 20px rgba(46,204,113,.4);
}

/* ── Waiting screen ── */
#waitingScreen{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#111;
display:none;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:999;
gap:28px;
}

#waitingScreen h1{
font-size:2.4rem;
letter-spacing:2px;
margin:0;
background:linear-gradient(90deg,#3498db,#2ecc71);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.waiting-label{
font-size:1.05rem;
color:#aaa;
display:flex;
align-items:center;
letter-spacing:.5px;
}

/* animated dots */
.dot{
display:inline-block;
width:7px;height:7px;
border-radius:50%;
background:#2ecc71;
margin:0 3px 1px;
opacity:0;
animation: dotBounce 1.5s ease-in-out infinite;
}
.dot:nth-child(1){ animation-delay:0s; }
.dot:nth-child(2){ animation-delay:0.3s; }
.dot:nth-child(3){ animation-delay:0.6s; }

@keyframes dotBounce{
0%,100%{ opacity:0; transform:translateY(0); }
30%{ opacity:1; transform:translateY(-6px); }
60%{ opacity:.5; transform:translateY(0); }
}

/* floating card animation */
.card-spin{
width:64px;height:92px;
border-radius:12px;
background:linear-gradient(135deg,#1a3a5c,#2c5282);
border:2px solid rgba(52,152,219,.6);
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
animation: cardFloat 2.2s ease-in-out infinite;
box-shadow:0 8px 30px rgba(52,152,219,.25);
}

@keyframes cardFloat{
0%,100%{ transform:translateY(0) rotate(-4deg); }
50%{ transform:translateY(-14px) rotate(4deg); }
}

/* ── Scoreboard VS layout ── */
#score{
display:flex;
align-items:center;
justify-content:center;
gap:0;
margin:12px auto;
max-width:480px;
}

.score-side{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
gap:4px;
padding:10px 16px;
border-radius:10px;
background:rgba(255,255,255,0.04);
}

.score-side.is-you{
background:rgba(52,152,219,0.12);
border:1px solid rgba(52,152,219,0.3);
}

.score-name{
font-size:0.85rem;
color:#aaa;
letter-spacing:0.5px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
max-width:140px;
}

.score-side.is-you .score-name{
color:#fff;
font-weight:600;
}

.score-points{
font-size:2rem;
font-weight:700;
line-height:1;
color:#fff;
}

.score-side.is-you .score-points{
color:#3498db;
}

.score-check{
font-size:0.75rem;
color:#2ecc71;
height:14px;
}

.score-vs{
font-size:1rem;
font-weight:700;
color:#444;
letter-spacing:2px;
padding:0 14px;
flex-shrink:0;
margin-bottom:18px;
}

#result{
min-height:28px;
}

.result-loading{
display:flex;
align-items:center;
justify-content:center;
gap:10px;
margin:10px auto 0 auto;
color:#aaa;
font-weight:600;
letter-spacing:.2px;
}

.round-placeholder{
width:100%;
max-width:520px;
margin:10px auto 0 auto;
padding:16px 14px;
border-radius:12px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,255,255,0.08);
color:#aaa;
font-weight:600;
letter-spacing:.2px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
}

.timer-ring{
  --p: 0;
  width:22px;
  height:22px;
  border-radius:50%;
  background:conic-gradient(#2ecc71 calc(var(--p) * 1turn), rgba(255,255,255,.16) 0);
  position:relative;
  flex:0 0 auto;
}

.timer-ring::after{
  content:"";
  position:absolute;
  inset:3px;
  border-radius:50%;
  background:#111;
}

.timer-seconds{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  color:#eaeaea;
  font-weight:800;
  z-index:1;
}

.round-placeholder.is-urgent{
  border-color: rgba(46,204,113,.35);
  box-shadow: 0 10px 28px rgba(46,204,113,.12);
}

.round-stage{
width:100%;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
}

.sent-preview{
width:100%;
max-width:480px;
margin:12px auto 0 auto;
}

.sent-preview .card{
cursor:default;
pointer-events:none;
opacity:1;
transform:none;
animation:none;
}

.sent-preview .card:hover{
transform:none;
}

.calc-duel{
display:grid;
grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);
align-items:start;
justify-items:center;
column-gap:10px;
margin:10px auto 0 auto;
width:100%;
max-width:480px;
}

.calc-duel-side{
width:100%;
display:flex;
justify-content:center;
}

.calc-duel--single .calc-duel-side--opponent{
visibility:hidden;
}

.calc-duel .card{
cursor:default;
pointer-events:none;
opacity:1;
transform:none;
animation:none;
}

.calc-duel .card:hover{
transform:none;
box-shadow:0 6px 16px rgba(0,0,0,.6);
}

.calc-vs{
flex:0 0 auto;
display:flex;
align-items:center;
justify-content:center;
padding:0 6px;
font-weight:800;
letter-spacing:2px;
color:#333;
}

.calc-vs--ghost{
visibility:hidden;
}

.spinner{
width:18px;
height:18px;
border-radius:50%;
border:3px solid rgba(255,255,255,.16);
border-top-color:#2ecc71;
animation: spin .8s linear infinite;
}

@keyframes spin{
to { transform: rotate(360deg); }
}

@keyframes gameoverReveal{
from{
opacity:0;
transform:translateY(18px) scale(.97);
}
to{
opacity:1;
transform:translateY(0) scale(1);
}
}

@keyframes rematchFadeIn{
from{
opacity:0;
transform:translateY(8px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.card-info{
font-size:11px;
text-align:left;
margin-top:6px;
line-height:1.2;

overflow:hidden;
}

.card-info p{
margin:2px 0;
word-wrap:break-word;
}

@keyframes dealCard {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@media (max-width: 640px){
  .gameover-panel{
    padding:22px 16px 24px;
    gap:12px;
  }

  .gameover-scoreline{
    gap:10px;
  }

  .gameover-score{
    min-width:140px;
    width:100%;
    max-width:220px;
  }
}
</style>

</head>

<body>

<!-- Login screen -->
<div id="loginScreen">
  <h1>Battle.dev</h1>
  <div id="loginForm">
    <p style="color:#aaa;font-size:15px;margin:0 0 10px 0;">Digite seu nome para começar</p>
    <input 
      type="text" 
      id="playerNameInput" 
      placeholder="Seu nome..."
    />
    <button id="startGameBtn">Começar</button>
  </div>
</div>

<!-- Waiting for opponent screen -->
<div id="waitingScreen">
  <div class="card-spin">&#127183;</div>
  <h1>Battle.dev</h1>
  <p id="waitingPlayerName" style="color:#2ecc71;font-size:1rem;margin:0;letter-spacing:1px;"></p>
  <p id="playerCount" style="color:#aaa;font-size:14px;margin:0;"></p>
  <div class="waiting-label">
    Aguardando jogadores
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>

<h1>Battle.dev</h1>

<h2 id="question">Aguardando jogadores...</h2>

<div id="status"></div>

<div id="score">
Jogador1: <span id="p1">0</span>
|
Jogador2: <span id="p2">0</span>
</div>

<div id="pickTimerBanner" class="round-placeholder" style="display:none;"></div>

<div id="cards"></div>

<button id="confirmBtn">
Confirmar seleção
</button>

<h2 id="result"></h2>

<button id="nextBtn">
Próxima rodada
</button>

<button id="rematchBtn" style="display:none;">
Jogar novamente
</button>

<button id="declineRematchBtn" style="display:none;">
Voltar ao lobby
</button>

<script type="module" src="client.js"></script>


</body>
</html>
